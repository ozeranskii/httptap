name: Pre-commit policy validation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".pre-commit-config.yaml"
      - ".yamlfmt"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pre-commit.yml"

  push:
    branches:
      - main
    paths:
      - ".pre-commit-config.yaml"
      - ".yamlfmt"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pre-commit.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit-policy-check:
    name: Validate pre-commit config & hooks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync only precommit dependencies
        run: |
          uv sync --locked --no-dev --group precommit
          uv run pre-commit --version

      - name: Validate pre-commit config
        run: |-
          uv run pre-commit validate-config
          uv run pre-commit validate-manifest
