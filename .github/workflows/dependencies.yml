name: Dependency Check

on:
  schedule:
    # Run weekly on Mondays at 8:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-lockfile:
    name: Check Lockfile Status
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Check if lockfile is up-to-date
        run: uv lock --check

      - name: Show dependency tree
        if: always()
        run: uv tree

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Export dependencies for audit
        run: uv export --no-hashes --no-editable -o requirements.txt

      - name: Upload requirements for review
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: requirements-audit
          path: requirements.txt
          retention-days: 7
          compression-level: 9
          if-no-files-found: warn

      - name: Install and run pip-audit
        run: |
          uv tool install pip-audit
          uv tool run pip-audit -r requirements.txt --desc

  test-dependency-updates:
    name: Test Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Update lockfile with latest versions
        run: uv lock --upgrade

      - name: Install updated dependencies
        run: uv sync --group test

      - name: Run tests with updated dependencies
        run: uv run pytest tests/ -v

      - name: Show lockfile diff
        if: always()
        run: git diff uv.lock
