name: Release

env:
  PACKAGE_NAME: httptap
  CHANGELOG_FILE: CHANGELOG.md

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version (e.g., 0.3.0) - leave empty to use bump"
        required: false
        type: string
      bump:
        description: "Bump type (used if version is empty)"
        required: false
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      notes: ${{ steps.notes.outputs.text }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Update project version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "Using explicit version: ${VERSION}"
            uv version "${VERSION}"
          else
            BUMP="$INPUT_BUMP"
            echo "Bumping version: ${BUMP}"
            uv version --bump "${BUMP}"
            VERSION=$(uv version --short)
          fi

          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Final version: ${VERSION}"

      - name: Refresh lockfile
        run: uv lock

      - name: Ensure changelog exists
        run: touch ${CHANGELOG_FILE}

      - name: Install git-cliff
        uses: taiki-e/install-action@1125859c32e957870377308157ca1b4b4ebb3b2d # git-cliff

      - name: Generate changelog entry
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Generate full changelog and prepend to CHANGELOG.md
          git cliff --config .release/git-cliff.toml --tag "${TAG}" --unreleased --prepend ${CHANGELOG_FILE}
          # Extract notes for GitHub release (try --latest, fallback to --unreleased)
          NOTES=$(git cliff --config .release/git-cliff.toml --tag "${TAG}" --latest --strip header 2>/dev/null || \
                  git cliff --config .release/git-cliff.toml --tag "${TAG}" --unreleased --strip header)
          {
            echo "text<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit release changes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add pyproject.toml uv.lock ${CHANGELOG_FILE}
          git commit -m "chore: release v${VERSION}"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin HEAD
          git push origin "${TAG}"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: prepare

    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group test

      - name: Run tests
        run: uv run pytest

      - name: Build distribution
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist
          path: dist/
          retention-days: 7
          compression-level: 6
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - prepare
      - build
    environment:
      name: pypi
      url: https://pypi.org/project/${{ env.PACKAGE_NAME }}/
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - prepare
      - build
      - publish-pypi

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          NOTES: ${{ needs.prepare.outputs.notes }}
        run: |-
          gh release create "$TAG" \
            dist/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes "$NOTES"
