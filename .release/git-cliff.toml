# git-cliff configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}\
{% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }} \
([{{ commit.id | truncate(length=7, end="") }}](https://github.com/ozeranskii/httptap/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
    ### New Contributors
    {% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
        - @{{ contributor.username }} made their first contribution\
{% if contributor.pr_number %} in [#{{ contributor.pr_number }}](https://github.com/ozeranskii/httptap/pull/{{ contributor.pr_number }}){% endif %}\
    {% endfor %}
{% endif %}

"""
# Template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""
# Remove the leading and trailing whitespace from the templates
trim = true

[git]
# Parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# Filter out the commits that are not conventional
filter_unconventional = true
# Process each line of a commit as an individual commit
split_commits = false
# Regex for preprocessing the commit messages
commit_preprocessors = [
  { pattern = '^\s+', replace = "" },
  { pattern = '\s*\((\w+\s)?#([0-9]+)\)', replace = "" },
]
# Regex for parsing and grouping commits
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^chore: release", skip = true },
  { message = "^chore\\(deps", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^(chore|ci)", group = "Miscellaneous Tasks" },
  { body = ".*security", group = "Security" },
  { message = "^revert", group = "Revert" },
]
# Protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = true
# Filter out the commits that are not matched by commit parsers
filter_commits = true
# Regex for matching git tags
tag_pattern = "v[0-9].*"
# Regex for skipping tags
skip_tags = "v0\\.1\\.0-beta\\.1"
# Sort the tags topologically
topo_order = false
# Sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
# Parse issue/PR references from commit messages
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/ozeranskii/httptap/issues/$1" },
]

[bump]
# A breaking change always bumps the major version
breaking_always_bump_major = true
# A feat commit always bumps the minor version
features_always_bump_minor = true
# Initial tag for the repository
initial_tag = "0.1.0"

[remote.github]
owner = "ozeranskii"
repo = "httptap"
